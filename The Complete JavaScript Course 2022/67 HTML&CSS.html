<!--
attribute - describe element
in-line element - a tag
block element - h2 tag
각 element는 그에 맞는 attribute를 가지고 있다. 따라서, a tag에 src attribute
는 적용되지 않으며, img tag에 href atrribute를 적용해도 아무런 변화가 일어나지 않는다.

id & class attribute
element에 이름을 부여하여 CSS에서 선택 가능하도록 돕는 속성이다.
단, id는 unique하다. 따라서 각 id는 페이지에 단 한 번만 사용 가능하며,
class는 몇번이고 사용 가능하다.
그렇기에 css에서 선택자를 이용해 element를 선택하고자 한다면, class를 이용하는 것이
옳바른 선택이다.
--!>
